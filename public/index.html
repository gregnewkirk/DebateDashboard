<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=2160, height=3840, initial-scale=1.0">
  <title>DR. GREG DEBATES</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Oswald:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- BACKGROUND — iframe for WebGL/Vanta or canvas for legacy -->
<iframe id="bg-frame-a" style="position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:0;pointer-events:none;display:none;opacity:1;transition:opacity 2.5s ease-in-out;"></iframe>
<iframe id="bg-frame-b" style="position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:0;pointer-events:none;display:none;opacity:0;transition:opacity 2.5s ease-in-out;"></iframe>
<canvas id="bg" width="2160" height="3840"></canvas>

<!-- MAIN CONTENT SHELL -->
<div class="content">

  <!-- HEADER -->
  <div class="header-section">
    <h1>DR. GREG DEBATES</h1>
    <div class="header-subtitle">SCIENCE DEMANDS TRUTH</div>
  </div>

  <!-- CHALLENGER BAR -->
  <div class="challenger-section" id="challenger-section">
    <div class="challenger-label">CHALLENGER</div>
    <div class="challenger-name" id="challenger-name">AWAITING TARGET</div>
  </div>

  <!-- DYNAMIC CONTENT AREA -->
  <div class="middle-zone" id="main-content">
    <!-- Fact cards, debate prompts, alerts injected here by app.js -->
  </div>

  <!-- BOTTOM BANNER (always visible) -->
  <div class="bottom-zone">
    <div class="bottom-banner">
      <div class="bottom-text">SUPPORT THE SHOW</div>
      <div class="bottom-sub">DONATE.DRGREGSHOW.COM</div>
    </div>
  </div>

</div>

<!-- Listening Indicator (floating) -->
<div class="listening-indicator" id="listening-indicator">
  <span class="mic-icon">&#9673;</span>
  <span>ACTIVE</span>
</div>

<!-- MARIE CURIE — AI CO-HOST: TOP-HALF TAKEOVER -->
<div class="marie-container" id="marie-container" style="display:none;">
  <div class="marie-top-accent"></div>
  <div class="marie-tag">MARIE CURIE — AI CO-HOST</div>
  <canvas class="marie-waveform" id="marie-canvas" width="1920" height="440"></canvas>
  <div class="marie-speech" id="marie-speech"></div>
  <div class="marie-citation" id="marie-citation" style="display:none;">
    <div class="marie-citation-label">📎 SOURCE</div>
    <div class="marie-citation-text" id="marie-citation-text"></div>
  </div>
  <div class="marie-subtitle">NOBEL LAUREATE · PHYSICS 1903 · CHEMISTRY 1911</div>
  <div class="marie-bottom-border"></div>
</div>

<!-- DISMISS BUTTON (hidden from viewers, bottom of screen) -->
<div class="dismiss-zone" id="dismiss-zone" onclick="dismissPaymentAlert(); returnToStandby();">
  <span>TAP TO DISMISS</span>
</div>

<!-- SLIDE-OUT TOOLBAR — hidden tab on left edge -->
<div class="toolbar-tab" id="toolbar-tab" onclick="toggleToolbar()">&#9654;</div>
<div class="toolbar" id="toolbar">
  <div class="toolbar-close" onclick="toggleToolbar()">&#10005;</div>
  <div class="toolbar-header">CONTROLS</div>
  <button class="tb-btn tb-reset" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'q'}))">&#9724; RESET ALL</button>
  <div class="toolbar-divider"></div>
  <div class="toolbar-section">SESSION</div>
  <button class="tb-btn tb-green" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'s'}))">&#9654; START SESSION</button>
  <div class="toolbar-divider"></div>
  <div class="toolbar-section">MARIE CURIE</div>
  <button class="tb-btn tb-gold" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'f'}))">⚡ FIRE FACT CHECK (F)</button>
  <button class="tb-btn tb-gold" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'e'}))">🎯 BAIT CHAT (E)</button>
  <button class="tb-btn" onclick="fetch('/api/marie/queue/clear',{method:'POST'})">🗑 CLEAR QUEUE</button>
  <button class="tb-btn" onclick="fetch('/api/marie/stop',{method:'POST'})">■ STOP MARIE</button>
  <button class="tb-btn" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'d'}))">★ TEST FACT CHECK</button>
  <button class="tb-btn" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'z'}))">&#10067; POP QUIZ</button>
  <div class="toolbar-divider"></div>
  <div class="toolbar-section">CARDS</div>
  <button class="tb-btn" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'p'}))">&#128176; DONATION</button>
  <button class="tb-btn" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'r'}))">&#128203; REPORT CARD</button>
  <button class="tb-btn" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'l'}))">&#128260; LOOP BREAKER</button>
  <button class="tb-btn" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'a'}))">&#128250; AD SCREEN</button>
  <div class="toolbar-divider"></div>
  <div class="toolbar-section">OVERLAYS</div>
  <button class="tb-btn tb-toggle" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'b'}))">&#127922; BINGO</button>
  <button class="tb-btn tb-toggle" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'c'}))">&#128200; CREDIBILITY</button>
  <button class="tb-btn tb-toggle" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'g'}))">&#128280; GRAPH</button>
  <div class="toolbar-divider"></div>
  <div class="toolbar-section">SYSTEM</div>
  <button class="tb-btn" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'t'}))">&#128295; SOUNDCHECK</button>
  <button class="tb-btn" onclick="fetch('/api/lights/off',{method:'POST'})">&#128161; LIGHTS OFF</button>
</div>

<script src="dna-helix.js"></script>
<script src="sfx.js"></script>
<script src="marie.js"></script>
<script src="app.js"></script>
<script src="devbar.js"></script>
</body>
</html>
