<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- PULSING MARGIN STARS -->
<div class="star">&#9733;</div>
<div class="star">&#9733;</div>
<div class="star">&#9733;</div>
<div class="star">&#9733;</div>

<div class="star">&#9733;</div>

<div class="star">&#9733;</div>

<!-- SIDE STRIPES -->
<div class="side-stripe-left"></div>
<div class="side-stripe-right"></div>

<!-- MAIN CONTENT SHELL -->
<div class="content">

  <!-- HEADER -->
  <div class="header-section">
    <div class="header-stars-row">
      <span>&#9733;</span>
      <span>&#9733;</span>
      <span>&#9733;</span>
      <span>&#9733;</span>
      <span>&#9733;</span>
    </div>
    <h1>DR. GREG DEBATES</h1>
    <div class="header-subtitle">LIBERTY DEMANDS TRUTH</div>
  </div>

  <!-- Angled divider: header to challenger -->
  <div class="angled-divider red-down"></div>

  <!-- CHALLENGER BAR -->
  <div class="challenger-section" id="challenger-section">
    <div class="challenger-label">CHALLENGER &#9654;</div>
    <div class="challenger-name" id="challenger-name">AWAITING TARGET</div>
  </div>

  <!-- Angled divider: challenger to middle -->
  <div class="angled-divider navy-up"></div>

  <!-- DYNAMIC CONTENT AREA -->
  <div class="middle-zone" id="main-content">
    <!-- Fact cards, debate prompts, alerts injected here by app.js -->
  </div>

  <!-- Chevron divider: middle to bottom -->
  <div class="chevron-divider"></div>

  <!-- BOTTOM BANNER (always visible) -->
  <div class="bottom-zone">
    <div class="bottom-banner">
      <div class="bottom-text">PATRIOTISM<br>REQUIRES VACCINES</div>
      <div class="bottom-sub">&#9733; DR. GREG &#9733;</div>
    </div>
  </div>

</div>

<!-- Listening Indicator (floating) -->
<div class="listening-indicator" id="listening-indicator">
  <span class="mic-icon">&#9673;</span>
  <span>ACTIVE</span>
</div>

<!-- MARIE CURIE — AI CO-HOST: TOP-HALF TAKEOVER (Design #5) -->
<div class="marie-container" id="marie-container" style="display:none;">
  <!-- Gold accent line at very top -->
  <div class="marie-top-accent"></div>

  <!-- Tag line -->
  <div class="marie-tag">MARIE CURIE</div>

  <!-- DNA Helix Spectrogram — this IS her visual identity -->
  <canvas class="marie-waveform" id="marie-canvas" width="960" height="280"></canvas>

  <!-- Speech text — large, readable, centered -->
  <div class="marie-speech" id="marie-speech"></div>

  <!-- Subtle subtitle -->
  <div class="marie-subtitle">AI CO-HOST</div>

  <!-- Bottom gold border that separates Marie from dashboard content below -->
  <div class="marie-bottom-border"></div>
</div>

<!-- DISMISS BUTTON (hidden from viewers, bottom of screen) -->
<div class="dismiss-zone" id="dismiss-zone" onclick="dismissPaymentAlert(); returnToStandby();">
  <span>TAP TO DISMISS</span>
</div>

<script src="sfx.js"></script>
<script src="marie.js"></script>
<script src="app.js"></script>
<script src="devbar.js"></script>
</body>
</html>
