<!DOCTYPE html>
<html><head><title>Stream Deck Icons</title>
<style>
body{background:#111;color:#fff;font-family:sans-serif;padding:20px;display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.icon-card{text-align:center;background:#222;padding:10px;border-radius:8px;border:2px solid #FFD700;}
.icon-card img{width:144px;height:144px;display:block;cursor:grab;border-radius:4px;}
.icon-card p{margin:8px 0 0;font-size:14px;color:#FFD700;font-weight:bold;}
h1{width:100%;text-align:center;color:#FFD700;letter-spacing:4px;}
h2{width:100%;text-align:center;color:#888;font-size:14px;}
</style></head><body>
<h1>STREAM DECK ICONS</h1>
<h2>Right-click each icon → Save Image As → then drag into Stream Deck button</h2>
<div class="icon-card"><img src="reset.png" draggable="true"><p>RESET ALL</p></div>
<div class="icon-card"><img src="stop.png" draggable="true"><p>STOP MARIE</p></div>
<div class="icon-card"><img src="fact.png" draggable="true"><p>FACT CHECK</p></div>
<div class="icon-card"><img src="quiz.png" draggable="true"><p>POP QUIZ</p></div>
<div class="icon-card"><img src="vs.png" draggable="true"><p>THIS OR THAT</p></div>
<div class="icon-card"><img src="donate.png" draggable="true"><p>DONATION</p></div>
<div class="icon-card"><img src="report.png" draggable="true"><p>REPORT CARD</p></div>
<div class="icon-card"><img src="loop.png" draggable="true"><p>LOOP BREAKER</p></div>
<div class="icon-card"><img src="ad.png" draggable="true"><p>AD SCREEN</p></div>
<div class="icon-card"><img src="lights.png" draggable="true"><p>LIGHTS OFF</p></div>
<div class="icon-card"><img src="bingo.png" draggable="true"><p>BINGO</p></div>
<div class="icon-card"><img src="cred.png" draggable="true"><p>CREDIBILITY</p></div>
<div class="icon-card"><img src="graph.png" draggable="true"><p>GRAPH</p></div>
<div class="icon-card"><img src="check.png" draggable="true"><p>SOUNDCHECK</p></div>
<div class="icon-card"><img src="back.png" draggable="true"><p>BACK</p></div>
</body></html>
